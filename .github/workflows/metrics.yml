name: GitHub Metrics Professional
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📊 Generate General Profile Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: stats.svg
          base: header, community, repositories, metadata
          base_indepth: yes
          config_timezone: America/Lima

      - name: 💻 Generate Detailed Language Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15 # Da más tiempo para analizar repos grandes
          plugin_languages_categories: markup, programming # Asegura que cuente código real
          plugin_languages_recent_load: 500
          plugin_languages_recent_days: 0
          plugin_languages_aliases: "Dart:Flutter" # Agrupa Dart y Flutter para resaltar tu stack
          plugin_languages_ignored: html, css, tex, markdown
          plugin_languages_limit: 8
          # IMPORTANTE: Descomenta la siguiente línea si tus proyectos principales son forks:
          repositories_forks: yes

      - name: 📅 Generate 3D Activity Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: calendar.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
