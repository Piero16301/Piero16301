name: GitHub Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # Se actualiza cada medianoche
  workflow_dispatch:
  push: {branches: ["main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📊 Generate General Profile Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: stats.svg
          base: header, community, repositories, metadata
          config_timezone: America/Lima
          config_theme: tokyonight
          config_order: base.header, base.community, base.repositories

      - name: 💻 Generate Detailed Language Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex
          plugin_languages_details: percentage
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          config_theme: tokyonight

      - name: 🔥 Generate Coding Habits and Activity
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: streak.svg
          base: ""
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          config_theme: tokyonight
