name: GitHub Metrics Professional
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📊 Generate General Profile Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: stats.svg
          base: header, community, repositories, metadata
          base_indepth: yes # Fuerza el escaneo profundo para evitar "0" datos
          config_timezone: America/Lima

      - name: 💻 Generate Detailed Language Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes # Escanea archivos dentro de repos para detectar Dart/Flutter
          plugin_languages_ignored: html, css, tex
          plugin_languages_details: percentage
          plugin_languages_limit: 8

      - name: 🔥 Generate Coding Habits and Activity
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: habits.svg
          base: ""
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_facts: yes
          plugin_habits_charts: yes
