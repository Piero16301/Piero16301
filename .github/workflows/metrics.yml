name: GitHub Metrics Professional
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📊 Generate General Profile Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: stats.svg
          base: header, community, repositories, metadata
          base_indepth: yes
          config_timezone: America/Lima

      - name: 💻 Generate Most Used Languages (with details)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: languages.svg
          base: "" # Importante: se deja vacío según el ejemplo para aislar el plugin
          plugin_languages: yes
          plugin_languages_ignored: >-
            html, css, tex, less, dockerfile, makefile, qmake, lex, cmake, shell,
            gnuplot
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 4

      - name: 📅 Generate 3D Activity Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: calendar.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
